<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام مراقبة الجسور</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .header h1 {
            color: #333;
            font-size: 24px;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-success {
            background: #4CAF50;
            color: white;
        }

        .btn-search-header {
            background: #ff9800;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-search-header:hover {
            transform: scale(1.05);
            background: #f57c00;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        .search-bar {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            align-items: flex-end;
            flex-wrap: wrap;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .search-group {
            flex: 1;
            min-width: 200px;
        }

        .search-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
            font-weight: bold;
        }

        .search-group select,
        .search-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn-reset {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            background: #f5f5f5;
            color: #666;
        }

        .btn-reset:hover {
            transform: scale(1.05);
        }

        .region-card {
            background: white;
            border-radius: 15px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .region-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .region-header h2 {
            font-size: 20px;
        }

        .region-stats {
            display: flex;
            gap: 15px;
            font-size: 14px;
        }

        .delete-region-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .delete-region-btn:hover {
            background: rgba(255, 0, 0, 0.6);
        }

        .bridges-grid {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .bridge-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            border-right: 4px solid #999;
            position: relative;
        }

        .bridge-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .bridge-card.online {
            border-right-color: #4CAF50;
        }

        .bridge-card.offline {
            border-right-color: #999;
            opacity: 0.7;
        }

        .bridge-card.warning {
            border-right-color: #ff9800;
        }

        .bridge-card.critical {
            border-right-color: #f44336;
        }

        .bridge-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .bridge-location {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
        }

        .bridge-status {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-online {
            background: #e8f5e8;
            color: #4CAF50;
        }

        .status-offline {
            background: #f5f5f5;
            color: #999;
        }

        .status-warning {
            background: #fff3e0;
            color: #ff9800;
        }

        .status-critical {
            background: #ffebee;
            color: #f44336;
        }

        .bridge-footer {
            margin-top: 10px;
            font-size: 12px;
            color: #999;
            display: flex;
            justify-content: space-between;
        }

        .delete-bridge-btn {
            background: #f44336;
            color: white;
            border: none;
            padding: 3px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            margin-top: 8px;
            width: 100%;
        }

        .delete-bridge-btn:hover {
            background: #d32f2f;
        }

        .empty-region {
            padding: 30px;
            text-align: center;
            color: #999;
        }

        .loading {
            text-align: center;
            color: white;
            padding: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌉 نظام مراقبة الجسور</h1>
            <div class="header-buttons">
                <button class="btn btn-primary" onclick="window.location.href='add-region.html'">➕ إضافة منطقة</button>
                <button class="btn btn-success" onclick="window.location.href='add-bridge.html'">🌉 إضافة جسر</button>
                <button class="btn-search-header" onclick="showSearchBar()">🔍 بحث</button>
            </div>
        </div>

        <!-- شريط البحث (مخفي في البداية) -->
        <div id="searchSection" style="display: none;">
            <div class="search-bar">
                <div class="search-group">
                    <label>📍 المنطقة:</label>
                    <select id="searchRegion" onchange="filterLive()">
                        <option value="">كل المناطق</option>
                    </select>
                </div>
                <div class="search-group">
                    <label>🌉 اسم الجسر:</label>
                    <input type="text" id="searchBridge" placeholder="اكتب اسم الجسر..." oninput="filterLive()">
                </div>
                <button class="btn-reset" onclick="resetSearchAndHide()">🗑️ إلغاء البحث</button>
            </div>
        </div>

        <div id="regionsContainer">
            <div class="loading">جاري التحميل...</div>
        </div>
    </div>

    <script>
        const socket = io();
        let allRegions = [];

        socket.on('bridges-status', () => {
            loadData();
        });

        window.onload = loadData;

        async function loadData() {
            try {
                const res = await fetch('/api/regions');
                allRegions = await res.json();
                renderRegions(allRegions);
            } catch (err) {
                document.getElementById('regionsContainer').innerHTML = `
                    <div style="background: white; padding: 40px; text-align: center; border-radius: 10px;">
                        <h3 style="color: #f44336;">❌ خطأ في التحميل</h3>
                        <p style="color: #666;">تأكد من تشغيل الخادم</p>
                    </div>
                `;
            }
        }

        function showSearchBar() {
            const searchSection = document.getElementById('searchSection');
            if (searchSection.style.display === 'none') {
                searchSection.style.display = 'block';
                const select = document.getElementById('searchRegion');
                select.innerHTML = '<option value="">كل المناطق</option>' +
                    allRegions.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
                // تفعيل الفلترة فوراً بعد ظهور شريط البحث
                filterLive();
            } else {
                resetSearchAndHide();
            }
        }

        // ✅ البحث الفوري (بدون زر)
        function filterLive() {
            const selectedRegionId = document.getElementById('searchRegion').value;
            const searchText = document.getElementById('searchBridge').value.trim().toLowerCase();
            
            let filteredRegions = [...allRegions];
            
            // فلتر حسب المنطقة
            if (selectedRegionId) {
                filteredRegions = filteredRegions.filter(r => r.id === selectedRegionId);
            }
            
            // فلتر حسب اسم الجسر (فوري)
            if (searchText) {
                filteredRegions = filteredRegions.map(region => ({
                    ...region,
                    bridges: region.bridges.filter(bridge => 
                        bridge.name.toLowerCase().includes(searchText)
                    )
                })).filter(region => region.bridges.length > 0);
            }
            
            renderRegions(filteredRegions);
            
            if (filteredRegions.length === 0) {
                document.getElementById('regionsContainer').innerHTML = `
                    <div style="background: white; padding: 40px; text-align: center; border-radius: 10px;">
                        <h3 style="color: #666;">🔍 لا توجد نتائج</h3>
                        <p style="color: #999;">لا توجد جسور تطابق بحثك</p>
                    </div>
                `;
            }
        }

        function resetSearchAndHide() {
            document.getElementById('searchSection').style.display = 'none';
            document.getElementById('searchRegion').value = '';
            document.getElementById('searchBridge').value = '';
            renderRegions(allRegions);
        }

        async function deleteRegion(regionId) {
            if (confirm('هل تريد حذف هذه المنطقة وجميع جسورها؟')) {
                const res = await fetch(`/api/regions/${regionId}`, { method: 'DELETE' });
                if (res.ok) loadData();
                else alert('❌ فشل حذف المنطقة');
            }
        }

        async function deleteBridge(bridgeId) {
            if (confirm('هل تريد حذف هذا الجسر؟')) {
                const res = await fetch(`/api/bridges/${bridgeId}`, { method: 'DELETE' });
                if (res.ok) loadData();
                else alert('❌ فشل حذف الجسر');
            }
        }

        function renderRegions(regions) {
            const container = document.getElementById('regionsContainer');
            
            if (!regions || regions.length === 0) {
                container.innerHTML = `
                    <div style="background: white; padding: 40px; text-align: center; border-radius: 10px;">
                        <h3 style="color: #666;">📭 لا توجد مناطق</h3>
                        <p style="color: #999; margin: 15px 0;">أضف منطقة جديدة للبدء</p>
                        <button class="btn btn-primary" onclick="window.location.href='add-region.html'">➕ إضافة منطقة</button>
                    </div>
                `;
                return;
            }

            container.innerHTML = regions.map(region => {
                const onlineCount = region.bridges.filter(b => b.status === 'online').length;
                const alertCount = region.bridges.filter(b => b.alerts && b.alerts.length > 0).length;

                return `
                    <div class="region-card">
                        <div class="region-header">
                            <h2>${region.name}</h2>
                            <div style="display: flex; align-items: center; gap: 15px;">
                                <div class="region-stats">
                                    <span>✅ ${onlineCount}</span>
                                    <span>⚠️ ${alertCount}</span>
                                    <span>🌉 ${region.bridges.length}</span>
                                </div>
                                <button class="delete-region-btn" onclick="deleteRegion('${region.id}')">🗑️ حذف المنطقة</button>
                            </div>
                        </div>
                        
                        <div class="bridges-grid">
                            ${region.bridges.length === 0 ? `
                                <div class="empty-region">
                                    <p>لا توجد جسور في هذه المنطقة</p>
                                    <button class="btn btn-success" onclick="window.location.href='add-bridge.html?regionId=${region.id}'" style="padding: 5px 15px; font-size: 13px;">
                                        + إضافة جسر
                                    </button>
                                </div>
                            ` : region.bridges.map(bridge => {
                                let statusClass = 'offline';
                                let statusText = 'غير متصل';
                                
                                if (bridge.status === 'online') {
                                    if (bridge.readings && bridge.readings.length > 0) {
                                        const lastReading = bridge.readings[bridge.readings.length - 1];
                                        if (lastReading.alert === true) {
                                            if (lastReading.severity === 'critical') {
                                                statusClass = 'critical';
                                                statusText = 'خطر';
                                            } else if (lastReading.severity === 'warning') {
                                                statusClass = 'warning';
                                                statusText = 'تحذير';
                                            }
                                        } else {
                                            statusClass = 'online';
                                            statusText = 'طبيعي';
                                        }
                                    } else {
                                        statusClass = 'online';
                                        statusText = 'متصل';
                                    }
                                }

                                const lastSeen = bridge.lastSeen 
                                    ? new Date(bridge.lastSeen).toLocaleTimeString('ar-SA')
                                    : 'لم يتصل';

                                return `
                                    <div class="bridge-card ${statusClass}" onclick="window.location.href='bridge.html?id=${bridge.id}'">
                                        <div class="bridge-name">${bridge.name}</div>
                                        <div class="bridge-location">${bridge.location || 'موقع غير محدد'}</div>
                                        <div style="margin: 10px 0;">
                                            <span class="bridge-status status-${statusClass}">${statusText}</span>
                                        </div>
                                        <div class="bridge-footer">
                                            <span>🕒 ${lastSeen}</span>
                                            ${bridge.alerts && bridge.alerts.length > 0 ? '<span>🔔 إنذار</span>' : ''}
                                        </div>
                                        <button class="delete-bridge-btn" onclick="event.stopPropagation(); deleteBridge('${bridge.id}')">🗑️ حذف الجسر</button>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
